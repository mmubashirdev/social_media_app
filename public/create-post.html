<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post - Social Media App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar border">
      <div class="container">
        <a href="dashboard.html" class="logo fs-2">GetSocial</a>
        <a href="edit-profile.html" class="btn btn-outline-primary ms-auto"
          >Edit Profile</a
        >
      </div>
    </nav>
    <div class="container mt-4">
      <h3>Create New Post</h3>
      <form id="postForm">
        <div class="form-group">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            class="form-control"
            placeholder="Enter post title"
            required
          />
        </div>
        <div class="form-group">
          <label for="caption">Caption</label>
          <textarea
            id="caption"
            name="caption"
            class="form-control"
            placeholder="What's on your mind?"
            rows="3"
            required
          ></textarea>
        </div>
        <div class="form-group half">
          <input
            type="file"
            name="image"
            id="image"
            class="form-control d-none"
            accept="image/*"
          />
          <label
            for="image"
            class="upload-label"
            style="
              cursor: pointer;
              display: flex;
              flex-direction: column;
              align-items: center;
            "
          >
            <img
              id="postImagePreview"
              src="upload/image.png"
              alt="Image Preview"
              style="
                display: none;
                max-width: 500px;
                max-height: 500px;
                margin-bottom: 8px;
                border-radius: 8px;
                object-fit: cover;
                background: #f0f0f0;
              "
            />
            <p style="margin: 0; color: #555">Click to upload an image</p>
          </label>
        </div>
        <div class="form-group half">
          <label for="tags">Tags</label>
          <input
            type="text"
            name="tags"
            id="tags"
            class="form-control"
            placeholder="tech, life, coding"
          />
        </div>
        <button type="submit" class="btn btn-primary mt-3">Post</button>
      </form>
    </div>
    
    <script src="createPost.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
