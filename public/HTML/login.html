<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/login.css" />
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <form
      id="loginForm"
      class="d-flex flex-column w-25 shadow p-4 border-2 rounded-2"
      style="width: 400px !important"
    >
      <h2 class="text-primary my-3 pt-3 fw-bold text-center">LOGIN</h2>
      <div class="form-floating mb-3">
        <input
          class="form-control"
          type="email"
          name="email"
          id="email"
          placeholder="Enter email"
          autocomplete="on"
          required
        />
        <label class="form-label text-start" for="email"
          >Email <span class="required">*</span></label
        >
      </div>
      <div class="invalid-feedback" id="emailError" style="display: none">
        Invalid Email
      </div>
      <div class="position-relative">
        <div class="form-floating">
          <input
            class="form-control"
            type="password"
            name="password"
            id="password"
            placeholder="Enter password"
            required
          />
          <label class="form-label text-start" for="password"
            >Password <span class="required">*</span></label
          >
        </div>
        <i class="bi bi-eye-slash" id="togglePass" style="cursor: pointer"></i>
      </div>
      <div
        class="invalid-feedback"
        id="passwordError"
        style="display: none"
      ></div>
      <input
        type="submit"
        value="Sign In"
        id="submitBtn"
        class="btn btn-primary my-3 fw-medium w-100"
      />

      <div id="loadingOverlay" class="d-none">
        <div
          class="spinner-border spinner-border-lg text-primary"
          role="status"
          id="spinner"
        >
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <p class="text-center">
        Don't have an account?
        <a href="../HTML/signup.html" class="text-decoration-none fw-medium"
          >Signup</a
        >
      </p>
      <div class="text-center">
        <button
          type="button"
          onclick="showForgetPasswordPopup()"
          class="border-0 bg-white text-danger fst-italic"
        >
          Forget Password?
        </button>
      </div>
      <div class="text-center alert mb-0" id="forgetPass"></div>
    </form>

    <div
      id="popupOverlay"
      class="position-fixed top-0 start-0 w-100 h-100 d-none"
      style="background: rgba(0, 0, 0, 0.5); z-index: 1040"
    ></div>
    <form
      class="position-fixed top-50 start-50 translate-middle bg-light shadow p-4 border rounded w-50 d-none"
      id="forgetPasswordForm"
      style="z-index: 1050"
    >
      <h3 class="text-center text-danger">Reset Password</h3>
      <div>
        <label for="popupEmail" class="form-label"
          >Email<span class="required">*</span>:
        </label>
        <input
          type="email"
          name="popupEmail"
          id="popupEmail"
          placeholder="Enter email to reset your password"
          class="form-control mb-3"
          autocomplete="on"
          required
        />
        <div class="invalid-feedback" id="popupEmailError"></div>
      </div>
      <div class="d-flex justify-content-end">
        <button
          type="button"
          class="btn btn-secondary me-2"
          onclick="closeForgetPasswordPopup()"
        >
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-primary"
          onclick="submitForgetPasswordPopup()"
        >
          Submit
        </button>
      </div>
    </form>
    <script src="../JS/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
