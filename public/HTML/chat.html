<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messaging</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
    <link rel="stylesheet" href="../CSS/chat.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body class="chat-page">
    <aside class="  app-sidebar">
      <a href="dashboard-feed.html" class="app-sidebar-brand">GetSocial</a>
      <nav class="app-sidebar-nav">
        <a href="dashboard-feed.html" class="app-sidebar-link">
          <i class="bi bi-house-door"></i>
          <span>Home</span>
        </a>
        <a href="edit-profile.html" class="app-sidebar-link">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
        <a href="chat.html" class="app-sidebar-link active">
          <i class="bi bi-chat-left-text"></i>
          <span>Messages</span>
        </a>
      </nav>
      <button type="button" class="app-sidebar-logout">Logout</button>
    </aside>

    <main class="app-main">
      <div class="chat-shell">
        <div class="chat-layout">
          <aside class="chat-friends-panel">
            <div class="friends-panel-header">Messages</div>
            <div class="friends-list" id="friendsList"></div>
          </aside>

          <div class="chat-container">
            <div class="chat-header" id="chatHeaderTitle">Select a friend</div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input">
              <input
                type="text"
                id="messageInput"
                placeholder="Send a message..."
              />
              <button onclick="sendMessage()">Send</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="../JS/sidebar.js"></script>
    <script src="../JS/chat.js"></script>
  </body>
</html>
