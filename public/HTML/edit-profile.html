<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - Social Media App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/styles.css" />
    <link rel="stylesheet" href="../CSS/followers.css" />
    <link rel="stylesheet" href="../CSS/edit-profile.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <aside class="app-sidebar">
      <a href="../HTML/dashboard-feed.html" class="app-sidebar-brand"
        >GetSocial</a
      >
      <nav class="app-sidebar-nav">
        <a href="../HTML/dashboard-feed.html" class="app-sidebar-link">
          <i class="bi bi-house-door"></i>
          <span>Home</span>
        </a>
        <a href="../HTML/edit-profile.html" class="app-sidebar-link active">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
        <a href="../HTML/chat.html" class="app-sidebar-link">
          <i class="bi bi-chat-left-text"></i>
          <span>Messages</span>
        </a>
      </nav>
      <button type="button" class="app-sidebar-logout">Logout</button>
    </aside>

    <main class="app-main">
      <div class="container mt-4 profile-edit-wrap">
        <div class="profile-edit-card">
          <h3 class="profile-edit-title">Profile</h3>
          <form
            id="editProfileForm"
            class="profile-edit-form"
            enctype="multipart/form-data"
          >
            <div class="mb-4 profile-summary d-flex align-items-center gap-4">
              <label for="profilePicInput" class="avatar-picker">
                <img
                  id="profilePicPreview"
                  src="/upload/image.png"
                  alt="Profile Picture"
                  class="rounded-circle mb-2 profile-avatar"
                  width="80"
                  height="80"
                />
                <input
                  type="file"
                  class="form-control mt-2 d-none"
                  id="profilePicInput"
                  name="profilePic"
                  accept="image/*"
                />
              </label>
              <div class="profile-stats">
                <div class="profile-stat totalPosts fw-bold mx-3">
                  <span class="d-block profile-stat-count" id="postNumber"
                    >0</span
                  >
                  <span class="d-block profile-stat-label">Posts</span>
                </div>
                <div
                  class="profile-stat totalFollowers fw-bold mx-3 stat-clickable"
                  id="followersCount"
                >
                  <span class="d-block profile-stat-count" id="followersNumber"
                    >0</span
                  >
                  <span class="d-block profile-stat-label">Followers</span>
                </div>
                <div
                  class="profile-stat totalFollowing fw-bold mx-3 stat-clickable"
                  id="followingCount"
                >
                  <span class="d-block profile-stat-count" id="followingNumber"
                    >0</span
                  >
                  <span class="d-block profile-stat-label">Following</span>
                </div>
              </div>
            </div>
            <div class="mb-3">
              <label for="visibility" class="form-label"
                >Profile Visibility</label
              >
              <select class="form-select" id="visibility" name="visibility">
                <option value="public">Public</option>
                <option value="private">Private</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="editUsername" class="form-label">Username</label>
              <input
                type="text"
                class="form-control"
                id="editUsername"
                name="username"
                required
              />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                disabled
                title="Email cannot be changed"
              />
            </div>
            <div class="mb-3">
              <label for="editPassword" class="form-label"
                >Change Password</label
              >
              <input
                type="password"
                class="form-control"
                id="editPassword"
                name="password"
              />
            </div>
            <button type="submit" class="btn btn-primary profile-save-btn">
              Save Changes
            </button>
          </form>
        </div>
      </div>
    </main>

    <script src="../JS/editProfile.js"></script>
    <script src="../JS/followers.js"></script>
    <script src="../JS/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
