<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/signup.css" />
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <form
      id="signupForm"
      class="d-flex flex-column shadow p-4 border-2 rounded-2"
      style="width: 400px"
    >
      <h2 class="text-primary text-center fw-bold">SIGNUP</h2>
      <div>
        <label class="form-label mt-2 text-start" for="username"
          >Username <span class="required">*</span></label
        >
        <input
          class="form-control"
          type="text"
          name="username"
          id="username"
          placeholder="Enter username"
          required
        />
        <div class="invalid-feedback">
          Invalid username. Must be 3 to 30 characters long with no spaces.
        </div>
      </div>
      <div>
        <label class="form-label mt-2 text-start" for="email"
          >Email <span class="required">*</span></label
        >
        <input
          class="form-control"
          type="email"
          name="email"
          id="email"
          placeholder="Enter email"
          required
        />
        <div class="invalid-feedback text-start" id="emailError"></div>
      </div>

      <label class="form-label mt-2 text-start" for="password"
        >Password <span class="required">*</span></label
      >
      <div class="input-group" id="inputGroup">
        <input
          class="form-control"
          type="password"
          name="password"
          id="password"
          placeholder="Enter password"
          required
        />
        <span class="input-group-text bg-white">
          <i
            class="bi bi-eye-slash"
            id="togglePass"
            style="cursor: pointer"
          ></i>
        </span>
      </div>
      <div class="d-none mt-1" id="conditions">
        <p class="text-secondary mb-0">
          <i class="bi bi-check2-circle"></i> Must be at least 8 characters
        </p>
        <p class="text-secondary mb-0">
          <i class="bi bi-check2-circle"></i> Must contain uppercase
        </p>
        <p class="text-secondary mb-0">
          <i class="bi bi-check2-circle"></i> Must contain lowercase
        </p>
        <p class="text-secondary mb-0">
          <i class="bi bi-check2-circle"></i> Must contain number
        </p>
        <p class="text-secondary mb-0">
          <i class="bi bi-check2-circle"></i> Must contain special character
        </p>
      </div>

      <label class="form-label mt-2 text-start" for="confirmPassword"
        >Confirm Password <span class="required">*</span></label
      >
      <div class="input-group">
        <input
          class="form-control"
          type="password"
          name="confirmPassword"
          id="confirmPassword"
          placeholder="Confirm password"
          required
        />
        <span class="input-group-text bg-white">
          <i
            class="bi bi-eye-slash"
            id="toggleConfirmPass"
            style="cursor: pointer"
          ></i>
        </span>
        <div class="invalid-feedback text-start" id="confirmPassError">
          Passwords do not match
        </div>
      </div>
      <input
        type="submit"
        value="Sign Up"
        class="btn btn-primary my-3 fw-medium"
        id="submitBtn"
      />

      <div id="loadingOverlay" class="d-none">
        <div
          class="spinner-border spinner-border-lg text-primary"
          role="status"
          id="spinner"
        >
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <p class="text-center">
        Already have an account?
        <a href="../HTML/login.html" class="text-decoration-none fw-medium">Login</a>
      </p>
    </form>
    <script src="../JS/signup.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
