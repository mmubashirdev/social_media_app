<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed - Social Media App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <nav class="navbar border">
      <div class="container d-flex align-items-center">
        <a href="dashboard-feed.html" class="logo fs-2">GetSocial</a>
        <a href="create-post.html" class="btn btn-outline-success ms-auto"
          >Create Post</a
        >
        <a href="edit-profile.html" class="btn btn-outline-primary ms-2"
          >Edit Profile</a
        >
        <div class="dropdown notification-bell ms-3">
          <button
            class="border-0 bg-white position-relative"
            type="button"
            data-bs-toggle="dropdown"
            aria-label="Notifications"
          >
            <i class="bi bi-bell fs-4"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li class="dropdown-item">No notifications</li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container main-content mt-4">
      <h2 class="h2 text-white">Feed</h2>
      <div id="posts" class="posts-grid"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="feed.js"></script>
    <script src="followers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
