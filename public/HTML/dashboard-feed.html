<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed - Social Media App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/styles.css" />
    <link rel="stylesheet" href="../CSS/followers.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <aside class="app-sidebar">
      <a href="dashboard-feed.html" class="app-sidebar-brand">GetSocial</a>
      <nav class="app-sidebar-nav">
        <a href="dashboard-feed.html" class="app-sidebar-link active">
          <i class="bi bi-house-door"></i>
          <span>Home</span>
        </a>
        <a href="../HTML/edit-profile.html" class="app-sidebar-link">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
        <a href="../HTML/chat.html" class="app-sidebar-link">
          <i class="bi bi-chat-left-text"></i>
          <span>Messages</span>
        </a>
      </nav>
      <button type="button" class="app-sidebar-logout">Logout</button>
    </aside>

    <main class="app-main">
      <nav class="navbar border feed-topbar">
        <div class="feed-topbar-inner">
          <div class="feed-topbar-left">
            <h1 class="feed-topbar-title">Socify</h1>
          </div>

          <div class="feed-topbar-actions">
            <a href="../HTML/create-post.html" class="feed-action-btn">
              <i class="bi bi-plus-circle"></i>
              <span>Create</span>
            </a>

            <div class="dropdown notification-bell">
              <button
                class="feed-notification-btn"
                type="button"
                data-bs-toggle="dropdown"
                aria-label="Notifications"
              >
                <i class="bi bi-bell"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li class="dropdown-item">No notifications</li>
              </ul>
            </div>
            <div class="profile" onclick="profile()">
              <img
                src="../upload/Mubashir.jpg"
                alt="Profile Picture"
                class="rounded-circle profile-pic"
                width="40px" height="40px"
              />
              <span class="profile-name">Mubashir</span>
            </div>
          </div>
        </div>
      </nav>

      <div class="container main-content mt-4">
        <h2 class="h2 text-white">Feed</h2>
        <div id="posts" class="posts-grid"></div>
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../JS/feed.js"></script>
    <script src="../JS/followers.js"></script>
    <script src="../JS/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
