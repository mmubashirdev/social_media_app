<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - Social Media App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar border">
      <div class="container">
        <a href="dashboard.html" class="logo fs-2">GetSocial</a>
        <a href="create-post.html" class="btn btn-outline-success ms-auto"
          >Create Post</a
        >
      </div>
    </nav>
    <div class="container mt-4">
      <h3>Edit Profile</h3>
      <form id="editProfileForm" enctype="multipart/form-data">
        <div class="mb-3 d-flex align-items-center gap-4">
          <label
            for="profilePicInput"
            style="cursor: pointer; display: inline-block"
          >
            <img
              id="profilePicPreview"
              src="upload/image.png"
              alt="Profile Picture"
              class="rounded-circle mb-2"
              width="80"
              height="80"
            />
            <input
              type="file"
              class="form-control mt-2 d-none"
              id="profilePicInput"
              name="profilePic"
              accept="image/*"
            />
          </label>
          <div class="totalPosts fw-bold mx-3">
            <span class="d-block" id="postNumber">0</span>
            <span class="d-block">Posts</span>
          </div>
          <div
            class="totalFollowers fw-bold mx-3"
            id="followersCount"
            style="cursor: pointer"
          >
            <span class="d-block" id="followersNumber">0</span>
            <span class="d-block">Followers</span>
          </div>
          <div
            class="totalFollowing fw-bold mx-3"
            id="followingCount"
            style="cursor: pointer"
          >
            <span class="d-block" id="followingNumber">0</span>
            <span class="d-block">Following</span>
          </div>
        </div>
        <!-- Profile Privacy section removed -->
        <div class="mb-3">
          <label for="editUsername" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="editUsername"
            name="username"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            disabled
            title="Email cannot be changed"
          />
        </div>
        <div class="mb-3">
          <label for="editPassword" class="form-label">Change Password</label>
          <input
            type="password"
            class="form-control"
            id="editPassword"
            name="password"
          />
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <script src="editProfile.js"></script>
    <script src="followers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
